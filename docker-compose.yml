services:
  db:
    image: postgres:16-alpine
    container_name: sportclub-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sportclub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Database password required}
      POSTGRES_DB: ${POSTGRES_DATABASE:-sportclub}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sportclub} -d ${POSTGRES_DATABASE:-sportclub}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sportclub-app
    restart: unless-stopped
    ports:
      - "10001:10001"
    environment:
      - POSTGRES_URL=postgres://${POSTGRES_USER:-sportclub}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DATABASE:-sportclub}
      - AUTH_SECRET=${AUTH_SECRET:?Auth secret required}
      - AUTH_URL=${AUTH_URL:-http://localhost:10001/api/auth}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@sportclub.com}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-changeme123}
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
