name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run linting
        run: npm run lint --if-present || true

      - name: Build application
        run: npm run build

      - name: Deploy to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          # Install sshpass for password authentication
          sudo apt-get update && sudo apt-get install -y sshpass 2>&1 | tail -5

          # Deploy via SSH with direct command execution
          sshpass -p "$VPS_PASSWORD" ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            "$VPS_USER@$VPS_HOST" << 'REMOTESCRIPT'
          #!/bin/bash
          set -e

          DEPLOY_PATH="app/sportclub-dasboard"

          echo "🚀 Starting deployment to $DEPLOY_PATH..."

          # Navigate to deployment directory
          cd "$DEPLOY_PATH" || { echo "❌ Cannot access $DEPLOY_PATH"; exit 1; }
          echo "✅ Changed to directory: $(pwd)"

          # Initialize git repository if not exists
          if [ ! -d ".git" ]; then
            echo "📦 Initializing git repository..."
            git init
            git remote add origin https://github.com/yotakeys/sportclub-dasboard.git
            echo "✅ Git initialized"
          else
            echo "✅ Git repository already exists"
          fi

          # Pull latest changes from GitHub
          echo "📥 Pulling latest code from GitHub..."
          git pull origin main || { echo "❌ Git pull failed"; exit 1; }
          echo "✅ Code pulled successfully"

          # Build and deploy with docker-compose
          echo "🐳 Deploying with Docker Compose..."
          sudo docker-compose down || true
          echo "✅ Stopped old containers"

          sudo docker-compose pull
          echo "✅ Pulled latest images"

          sudo docker-compose up -d --build
          echo "✅ Started new containers"

          # Verify deployment
          echo "⏳ Waiting for containers to start..."
          sleep 5

          echo "📊 Container status:"
          sudo docker-compose ps

          echo ""
          echo "✅ Deployment successful!"
          REMOTESCRIPT

      - name: Deployment Status
        if: success()
        run: echo "✅ Deployment to VPS completed successfully!"

      - name: Deployment Failed
        if: failure()
        run: echo "❌ Deployment failed. Please check the logs above."
