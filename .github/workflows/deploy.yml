name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run linting
        run: npm run lint --if-present || true

      - name: Build application
        run: npm run build

      - name: Deploy to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
          VPS_DEPLOY_PATH: ${{ secrets.VPS_DEPLOY_PATH }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          # Install sshpass for password authentication
          sudo apt-get update && sudo apt-get install -y sshpass

          # Create deployment script
          cat > deploy.sh << 'EOF'
          #!/bin/bash
          set -e

          echo "Starting deployment..."

          # Navigate to deployment directory
          cd $VPS_DEPLOY_PATH || { echo "❌ Cannot access $VPS_DEPLOY_PATH"; exit 1; }

          # Initialize git repository if not exists
          if [ ! -d ".git" ]; then
            echo "📦 Initializing git repository..."
            cd $VPS_DEPLOY_PATH
            git init
            git remote add origin https://github.com/yotakeys/sportclub-dasboard.git
          fi

          # Pull latest changes from GitHub
          echo "📥 Pulling latest code from GitHub..."
          git pull origin main || { echo "❌ Git pull failed"; exit 1; }

          # Build and deploy with docker-compose
          echo "🐳 Deploying with Docker Compose..."
          sudo docker-compose down || true
          sudo docker-compose pull
          sudo docker-compose up -d --build

          # Verify deployment
          echo "✅ Waiting for containers to start..."
          sleep 5
          sudo docker-compose ps

          echo "✅ Deployment successful!"
          EOF

          chmod +x deploy.sh

          # Execute deployment script on VPS via SSH
          sshpass -p "$VPS_PASSWORD" ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            "$VPS_USER@$VPS_HOST" bash -s < deploy.sh

      - name: Deployment Status
        if: success()
        run: echo "✅ Deployment to VPS completed successfully!"

      - name: Deployment Failed
        if: failure()
        run: echo "❌ Deployment failed. Please check the logs above."
